<h2 id="핵심-요약">핵심 요약</h2>
<p>이 논문은 Spotify Audio Intelligence Lab이 ICASSP 2022에서 발표한 자동 음악 채보(Automatic Music Transcription, AMT) 모델 <strong>Basic Pitch</strong>의 기반 연구다. 핵심 주장은 “작고 가벼운 단일 신경망 하나로도, 특정 악기 전용으로 정교하게 만든 최첨단(state-of-the-art) 시스템에 근접하는 음표(note) 채보 정확도를 얻을 수 있다”는 것이다. 기존 AMT 연구는 피아노 전용, 기타 전용처럼 악기별로 모델을 따로 만들었을 때(instrument-specific) 가장 좋은 성능을 보였고, 또한 프레임 단위 기본주파수(<span class="math inline"><em>f</em><sub>0</sub></span>) 추정만 할 때 더 높은 정확도를 보였다. 그러나 이런 특화 모델은 저장 공간·네트워크·메모리·실행 시간 제약 때문에 실제 제품 환경에 배포하기 어렵다는 문제가 있다.</p>
<p>Basic Pitch는 이 문제를 정면으로 다룬다. 모델은 <strong>악기에 무관(instrument-agnostic)</strong> 하고 <strong>다성음(polyphonic, 동시에 여러 음)</strong> 을 지원하며, 보컬을 포함한 다양한 악기에 일반화된다. 핵심 설계는 (1) 입력 표현으로 <strong>harmonic stacking(배음 적층)</strong> 을 사용해 배음 구조를 채널 축에 정렬하는 것과, (2) <strong>onset(음 시작)·multipitch(프레임별 다중 음높이)·note activation(음표 활성)</strong> 이라는 세 가지 출력을 하나의 모델로 동시에 예측하는 멀티태스크 구조다. 논문은 이 다중 출력 구조가 프레임 단위 음표 정확도를 향상시킨다는 것을 실험으로 보였다.</p>
<p>가장 인상적인 점은 효율성이다. 공개된 Basic Pitch 구현은 파라미터가 약 <strong>17,000개 미만</strong>, 최대 메모리 약 <strong>20MB 미만</strong>으로, 수백만~수억 개 파라미터를 쓰는 동시대 모델과 대조된다. 그럼에도 음표 추정 성능은 비교 가능한 베이스라인을 크게 앞서고, 프레임 단위 정확도는 특화 SOTA보다 약간 낮은 수준에 그친다. 이 연구는 이후 오픈소스 라이브러리(<a href="https://github.com/spotify/basic-pitch">github.com/spotify/basic-pitch</a>)와 웹 데모(<a href="https://basicpitch.io">basicpitch.io</a>)로 공개되어 AMT의 대중화에 크게 기여했다.</p>

<h2 id="상세-요약">상세 요약</h2>
<p>AMT는 오디오 신호를 악보 또는 MIDI 같은 기호적(symbolic) 표현으로 변환하는 과제다. 이 과제는 두 가지 하위 문제로 나눌 수 있다. 하나는 <strong>multipitch estimation(다중 음높이 추정)</strong> 으로, 각 시간 프레임마다 어떤 음높이들이 울리고 있는지를 추정하는 프레임 단위 문제다. 다른 하나는 더 어려운 <strong>note transcription(음표 채보)</strong> 으로, 개별 음표의 시작(onset), 지속, 끝(offset), 음높이를 묶어 하나의 이산적 사건(event)으로 추출하는 문제다.</p>
<p>논문은 기존 연구의 두 가지 경향을 비판적으로 짚는다. 첫째, 악기 전용 모델이 악기 무관 모델보다 좋은 성능을 내지만, 악기마다 별도 모델을 두면 배포 비용이 폭증한다. 둘째, 프레임 단위 <span class="math inline"><em>f</em><sub>0</sub></span> 추정만 하면 정확도가 높지만, 실제로 쓸모 있는 음표 단위 출력은 얻기 어렵다. Basic Pitch는 “작고, 악기 무관하며, 음표 단위 출력을 내는” 모델을 목표로 이 두 경향을 동시에 거스른다.</p>
<p>모델의 입력은 오디오에서 계산한 <strong>CQT(Constant-Q Transform)</strong> 계열의 시간-주파수 표현이며, 그 위에 <strong>harmonic stacking</strong> 을 적용한다. 어떤 음의 기본주파수가 있으면 그 정수배 위치에 배음이 존재하는데, harmonic stacking은 이 배음 위치들을 신경망 채널 축에 정렬시켜 작은 합성곱 신경망(CNN)이 배음 구조를 효율적으로 학습하도록 돕는다. 이는 큰 모델 없이도 음높이 식별력을 끌어올리는 핵심 트릭이다.</p>
<p>출력은 세 개의 사후확률(posteriorgram) 형태다. <strong><span class="math inline"><em>Y</em><sub><em>p</em></sub></span> (multipitch)</strong> 는 세밀한 주파수 해상도(반음을 더 잘게 나눈 빈)로 프레임별 음높이 활성을 나타내고, <strong><span class="math inline"><em>Y</em><sub><em>n</em></sub></span> (note)</strong> 는 반음(semitone) 단위로 음표 활성을 나타내며, <strong><span class="math inline"><em>Y</em><sub><em>o</em></sub></span> (onset)</strong> 는 음 시작 시점을 나타낸다. 이 세 출력은 서로 연결되어 함께 학습되며, 추론 시에는 onset과 note 출력을 결합한 후처리로 음표 사건을 디코딩하고, multipitch 출력에서 피치 벤드(pitch bend)까지 추정한다. 논문은 이 멀티 출력 학습이 단일 출력보다 프레임 단위 음표 정확도를 높인다는 것을 ablation으로 보였다.</p>

<p>의의는 분명하다. Basic Pitch는 AMT를 “연구실 안의 무거운 특화 모델”에서 “누구나 <code>pip install</code>로 쓰는 도구”로 끌어내렸다. CoreML·TensorFlow Lite·ONNX로 변환되어 macOS·Windows·Linux와 브라우저(WebAssembly)에서 실시간에 가깝게 동작하며, NeuralNote 같은 VST 플러그인으로도 확장되었다. 저자들은 “저자원(low-resource), 악기 무관 AMT 연구를 커뮤니티가 더 탐구하도록 장려하고 싶다”고 명시했고, 실제로 이후 다수의 연구·제품이 Basic Pitch를 베이스라인이나 전처리 도구로 채택했다.</p>
<h2 id="한계와-비판">한계와 비판</h2>
<ol type="1">
<li><p><strong>프레임 정확도의 한계</strong>: 논문 스스로 인정하듯, 악기 무관·경량화의 대가로 프레임 단위 음높이 정확도는 악기 전용 SOTA에 약간 못 미친다. 정밀한 피아노 채보 등 고정밀이 필요한 용도에서는 전용 모델이 여전히 유리하다.</p></li>
<li><p><strong>단일 악기 가정</strong>: GitHub 문서가 명시하듯 “한 번에 하나의 악기”에서 가장 잘 동작한다. 풀 밴드 믹스(드럼·베이스·보컬·기타가 동시에 섞인 음원)에서는 음원 분리(source separation)를 먼저 거치지 않으면 성능이 떨어진다. 이는 이후 Mel-RoFormer 같은 “분리 후 채보” 접근법의 동기가 되었다.</p></li>
<li><p><strong>다성·복잡도 한계</strong>: 동시에 매우 많은 음이 빽빽하게 겹치는 다성 패시지나 빠른 트릴, 미세한 음높이 표현에서는 onset·offset 경계가 흐려진다. 특히 음 끝(offset) 검출은 일반적으로 가장 어려운 부분이며, 경량 모델에서는 더 취약하다.</p></li>
<li><p><strong>인용/재현성 주의</strong>: 공개 모델은 논문 시점 이후 계속 개선되어, 논문에 보고된 수치와 현재 라이브러리의 동작이 정확히 일치하지 않을 수 있다. 재현 연구 시 코드 버전을 반드시 고정해야 한다.</p></li>
</ol>
<p>이런 한계에도 Basic Pitch는 “작아도 충분히 쓸모 있다”는 것을 실증해 AMT의 실용화 흐름을 연 이정표적 연구로 평가된다.</p>
