<h2 id="이-논문이-풀려는-문제는-무엇인가">이 논문이 풀려는 문제는 무엇인가</h2>
<p>앞선 “Onsets and Frames” 같은 모델은 피아노 녹음을 악보로 잘 바꿔주지만, 한 가지 답답한 점이 있었습니다. 시간을 잴 때 <strong>자(ruler)의 눈금이 너무 큼직했다</strong>는 겁니다. 소리를 약 10밀리초(0.01초)짜리 조각으로 잘라서 분석하다 보니, “음이 정확히 언제 시작됐는지”를 그 눈금 안에서밖에 못 잡았습니다. 마치 1cm 단위 자로 길이를 재면 0.3cm 같은 정밀한 값은 절대 못 읽는 것과 같습니다.</p>
<p>또 하나, 학습에 쓰는 녹음과 악보 데이터가 미세하게 어긋나 있으면(사람이 만든 데이터는 늘 조금씩 어긋납니다) 기존 모델은 성적이 뚝 떨어졌습니다. 그리고 피아노에서 정말 중요한 <strong>서스테인 페달</strong>(소리를 길게 울리게 하는 오른쪽 발판)은 아예 받아 적지 못했습니다. 이 논문은 이 세 가지를 한꺼번에 해결합니다.</p>
<h2 id="한-줄-비유로-본-핵심">한 줄 비유로 본 핵심</h2>
<p><strong>“눈금 칸 안에 ’여기쯤’이 아니라, 자를 대고 정확한 지점을 계산해 찍는다.”</strong> — 칸을 더 잘게 나누는 대신, 양옆 값을 보고 삼각형 꼭짓점의 정확한 위치를 수학으로 풀어냅니다.</p>

<h2 id="어떻게-작동하는가">어떻게 작동하는가</h2>
<ol type="1">
<li><p><strong>시작 순간에 삼각형 목표를 세운다.</strong> “이 프레임이 진짜 시작 시각에서 얼마나 떨어졌나”를 삼각형 모양 숫자로 표현합니다. 정확히 시작하는 지점에서 값이 1.0으로 가장 높고, 시간상 멀어질수록 비탈처럼 0으로 내려갑니다.</p></li>
<li><p><strong>컴퓨터가 이 비탈을 통째로 학습한다.</strong> “있다/없다”만 외우는 게 아니라 “얼마나 가까운가”라는 연속적인 거리 감각을 익힙니다.</p></li>
<li><p><strong>추론할 때 꼭짓점을 계산한다.</strong> 실제로 받아 적을 때, 봉우리 프레임과 양옆 두 프레임의 값 세 개를 가지고 삼각형의 진짜 꼭짓점이 어디인지 간단한 산수로 풀어냅니다. 그러면 프레임 눈금보다 훨씬 정밀한 시각이 나옵니다.</p></li>
<li><p><strong>여러 전문가가 서로 돕는다.</strong> 세기(velocity) 전문가가 시작 전문가를 돕고(여린 음 잡기에 유리), 시작·끝·지속 전문가의 정보가 합쳐져 최종 결과를 만듭니다.</p></li>
<li><p><strong>페달도 따로 받아 적는다.</strong> 음을 받아쓰는 팀과 별개로, 같은 방식의 페달 전담팀이 페달을 언제 밟고 뗐는지 기록합니다.</p></li>
</ol>
<h2 id="왜-중요한가">왜 중요한가</h2>
<p>첫째, <strong>정밀도</strong>입니다. 시간 허용 오차를 5밀리초처럼 아주 빡빡하게 줘도 기존 모델을 앞섭니다. 음악 편집·연구에서 “정확히 그 순간”이 필요할 때 큰 차이를 만듭니다.</p>
<p>둘째, <strong>강건성</strong>입니다. 학습 데이터가 살짝 어긋나 있어도 성능이 거의 안 떨어집니다(<a href="https://arxiv.org/abs/2010.01815">논문</a>). 기존 모델은 같은 조건에서 점수가 94점대에서 76점대로 폭락했지만, 이 모델은 96점대를 유지했습니다. 현실의 지저분한 데이터로도 잘 학습된다는 뜻이라 실무에서 매우 중요합니다.</p>
<p>셋째, <strong>페달 채보</strong>입니다. 페달은 피아노 연주의 표현력에서 빠질 수 없는데, 대규모로 이를 자동 채보한 최초의 사례입니다.</p>
<p>이 모델은 코드가 <a href="https://github.com/bytedance/piano_transcription">공개</a>되어 누구나 쓸 수 있고, 이를 이용해 수많은 클래식 피아노 연주를 MIDI로 변환한 대형 데이터셋(GiantMIDI-Piano)까지 만들어졌습니다. 오늘날 “피아노 음원을 악보로 바꾸는” 실용 도구의 사실상 표준 중 하나로, 정밀하고 튼튼한 자동 채보가 무엇인지 보여준 연구입니다.</p>
