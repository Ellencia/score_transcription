<h2 id="왜-데이터셋이-분야의-지형을-결정하는가">왜 데이터셋이 분야의 지형을 결정하는가</h2>
<p>AMT 분야가 왜 피아노는 정복하고 기타·보컬은 못 했는지를 한마디로 설명하면 <strong>데이터</strong> 때문이다. 피아노는 MAESTRO라는 약 200시간짜리 정밀 라벨 데이터가 있어 모델이 배불리 학습했고, 기타·보컬은 (실음원 + 정확한 라벨) 페어가 만성적으로 희소해 굶주렸다. 이 문서는 오디오·기타·OMR 세 영역의 핵심 데이터셋을 정리한다. 특히 <strong>기타의 만성적 페어 데이터 부족</strong>이 분야 전체의 병목임을 강조한다.</p>

<h2 id="영역별-해설">영역별 해설</h2>
<h3 id="오디오-데이터셋-피아노의-풍요-다중악기의-합성-의존">오디오 데이터셋 — 피아노의 풍요, 다중악기의 합성 의존</h3>
<p>오디오 채보의 정점에 <strong>MAESTRO</strong>가 있다. 약 198.7시간, 1,276개 연주를 Disklavier(연주를 MIDI로 캡처하는 피아노)로 녹음해 오디오와 MIDI를 약 3ms 정밀도로 정렬했다. 이 “풍부하고 정밀한 라벨”이 피아노 채보가 96~97%까지 올라온 결정적 원동력이다. 사람 채보자 100명을 동원해도 만들기 어려운 정확한 정답지를, 기계 피아노가 자동으로 찍어준 셈이다.</p>
<p>다중악기로 가면 사정이 달라진다. <strong>Slakh2100</strong>(~145h, 34악기)은 실연주가 아니라 <strong>합성(synthetic)</strong>이다 — 진짜 합주를 정확히 라벨링하기가 너무 어려워, 가상악기로 합성해 라벨을 자동 확보한 것이다. <strong>MusicNet</strong>과 <strong>URMP</strong>(44곡 앙상블)는 실연주 라벨을 제공하지만 규모가 작다. <strong>MAPS</strong>는 피아노 구(舊) 벤치마크로 MAESTRO 이전 세대다. 다중악기 영역이 합성 데이터에 의존한다는 사실 자체가, 실연주 라벨링의 어려움과 그로 인한 실전 성능 급락을 설명한다.</p>
<h3 id="기타-데이터셋-만성적-페어-데이터-부족-핵심">기타 데이터셋 — 만성적 페어 데이터 부족 ★핵심★</h3>
<p>기타 TAB이 어려운 근본 이유는 <strong>(실음원 + 정확한 현/프렛/주법) 페어 데이터가 희소</strong>하다는 데 있다. 각 데이터셋은 이 부족을 서로 다른 방식으로 메우려 하지만 모두 한계가 있다.</p>
<pre class="mermaid"><code>flowchart TB
    GS[&quot;GuitarSet&lt;br/&gt;실음원+정밀라벨&lt;br/&gt;BUT 360발췌 클린뿐&quot;]
    DG[&quot;DadaGP&lt;br/&gt;26,181곡 대규모&lt;br/&gt;BUT 오디오 없음(심볼릭만)&quot;]
    ST[&quot;SynthTab&lt;br/&gt;DadaGP를 합성 오디오화&lt;br/&gt;BUT 합성≠실연주&quot;]
    GA[&quot;GAPS&lt;br/&gt;14h 실기타&lt;br/&gt;최대 실오디오셋이지만 여전히 작음&quot;]
    EG[&quot;EGDB&lt;br/&gt;일렉기타 240탭&quot;]

    DG --&gt;|합성으로 오디오 확보| ST
    GS -.클린 한계.-&gt; GAP[&quot;페어 데이터 병목&quot;]
    DG -.오디오 없음.-&gt; GAP
    ST -.도메인 갭.-&gt; GAP
    GA -.규모 한계.-&gt; GAP</code></pre>
<ul>
<li><strong>GuitarSet</strong>은 탭 채보의 표준 정답이다. 헥사포닉 픽업으로 6개 현을 개별 수음해 현별로 정확한 라벨을 달았고, 주법 16종까지 주석했다. 하지만 360발췌(~30초)의 <strong>클린 환경뿐</strong>이라, 여기서 87~90%가 나와도 실제 팝 믹스에선 급락한다.</li>
<li><strong>DadaGP</strong>는 26,181곡·739장르의 거대한 GuitarPro 탭 모음이지만 <strong>결정적으로 오디오가 없다</strong>(심볼릭만). 탭은 있는데 그 탭이 어떻게 들리는지의 녹음이 없으니, 그대로는 “오디오→탭” 학습에 못 쓴다.</li>
<li><strong>SynthTab</strong>은 이 문제를 우회한다. DadaGP의 심볼릭 탭을 상용 플러그인으로 합성해 오디오를 만들어 페어를 확보한다. 다만 합성음과 실연주 사이의 도메인 갭이 남는다.</li>
<li><strong>GAPS</strong>(14h, 200+연주자)는 현재 최대 규모의 실기타 오디오 데이터셋으로, 클래식 기타 실연주에 노트레벨 MIDI를 붙였다. 그래도 MAESTRO(~200h)에 비하면 여전히 작다.</li>
<li><strong>EGDB</strong>는 일렉기타 전용으로, 240개 탭을 4가지 톤(앰프 모델)으로 렌더링했다.</li>
</ul>
<blockquote>
<p>⚠️ 마스터 보고서 주의: 이전 보고서들에 등장한 <strong>“GOAT” 데이터셋은 존재가 확인되지 않는다</strong>(arXiv/Zenodo/GitHub 미검증, GAPS와의 혼동으로 추정). 인용 시 주의.</p>
</blockquote>
<p>요약하면, 기타에는 “크면 오디오가 없고(DadaGP), 오디오가 정확하면 작거나 클린뿐(GuitarSet·GAPS)”이라는 딜레마가 있다. 그래서 분야는 <strong>합성(SynthTab)과 도메인 적응(10 Riley, 11 GAPS)</strong>으로 우회한다 — 데이터를 늘릴 수 없으니 다른 영역(피아노)에서 배운 모델을 빌려오거나 데이터를 가짜로 만들어 채우는 것이다.</p>
<h3 id="omr-데이터셋-인쇄는-풍족-필기는-척박">OMR 데이터셋 — 인쇄는 풍족, 필기는 척박</h3>
<p>악보 이미지 인식(OMR)의 데이터는 입력 종류에 따라 갈린다. <strong>인쇄 악보</strong> 쪽은 비교적 풍족하다 — <strong>DeepScores</strong>(인쇄 대규모), <strong>PrIMuS/Camera-PrIMuS</strong>(단성부 인쇄, 카메라 촬영 변형 포함), 그리고 12 OLiMPiC이 쓴 피아노포름 데이터셋이 있다. 반면 <strong>필기 악보</strong>는 <strong>CVC-MUSCIMA</strong>(필기 1,000장), <strong>MUSCIMA++</strong>(필기 상세주석 140장) 정도로 적고, 손글씨의 무한한 변이 탓에 필기 OMR(HMR)이 여전히 대부분 실패하는 근본 원인이 된다. <strong>MUSCIMA++</strong>는 notehead·stem·flag 같은 primitive 단위로 정밀 주석돼 기호 검출 연구에 쓰인다.</p>
