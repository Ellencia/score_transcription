<h2 id="핵심-요약">핵심 요약</h2>
<p>이 논문은 ByteDance(틱톡 모회사) 연구진이 제안한 <strong>고해상도 피아노 자동 채보(AMT)</strong> 시스템이다. 기존 모델들이 음의 시작·끝을 프레임 단위의 “있다/없다” 이진 분류로 판단해 시간 해상도가 프레임 간격(hop size)에 묶이는 한계가 있었던 데 반해, 이 연구는 각 음의 <strong>정확한 시작 시각·끝 시각을 연속값으로 회귀(regression)</strong> 한다. 추론 단계에서 인접한 세 프레임 예측값으로 삼각형 꼭짓점을 해석적(analytic)으로 계산해 프레임 간격보다 훨씬 정밀한 시각을 복원한다.</p>
<p>핵심 성과는 세 가지다. 첫째, MAESTRO 데이터셋에서 <strong>note onset F1 96.72%</strong> 로 Onsets and Frames(94.80%)를 능가했다(<a href="https://arxiv.org/abs/2010.01815">초록</a>). 둘째, 라벨이 어긋나 있어도(misaligned) 거의 흔들리지 않는 <strong>강건성</strong>을 수학적으로 증명·실증했다. 셋째, 대규모 데이터셋에서 <strong>서스테인 페달</strong>을 채보한 최초의 벤치마크(pedal onset F1 91.86%)를 제시했다.</p>
<p>이 시스템은 코드와 체크포인트가 <a href="https://github.com/bytedance/piano_transcription">GitHub</a>에 공개되었고, 이를 활용해 대규모 클래식 피아노 MIDI 데이터셋 <strong>GiantMIDI-Piano</strong>가 구축되었다. 현재 실무에서 가장 널리 쓰이는 피아노 채보 모델 중 하나다.</p>
<h2 id="서지-정보">서지 정보</h2>
<p>저자는 Qiuqiang Kong, Bochen Li, Xuchen Song, Yuan Wan, Yuxuan Wang이며 소속은 <strong>ByteDance</strong>다. 논문은 <a href="https://arxiv.org/abs/2010.01815">arXiv:2010.01815</a>(2020년 10월 최초 제출, 2021년 7월 v3 개정)로 공개되었고, 정식 출판은 <em>IEEE/ACM Transactions on Audio, Speech, and Language Processing(TASLP)</em> 2021이다. 소스 코드와 사전학습 가중치는 <a href="https://github.com/bytedance/piano_transcription">github.com/bytedance/piano_transcription</a>에 공개되어 있다.</p>
<h2 id="상세-요약">상세 요약</h2>
<p>이 논문의 출발점은 <strong>“프레임 분류는 시간 해상도가 거칠다”</strong> 는 통찰이다. 프레임이 10 ms라면 음의 시작 시각은 ±10 ms 안에서밖에 못 잡는다. 저자들은 객체 검출 기법 YOLO(이미지를 격자로 나눠 각 격자가 객체까지의 연속 거리를 예측)에서 영감을 얻어, “이 프레임이 가장 가까운 onset/offset에서 시간상 얼마나 떨어져 있는가”를 연속값으로 학습시킨다.</p>
<p>구체적으로 회귀 타깃은 <strong>삼각형 모양</strong>이다. onset 시각에서 정확히 1.0이 되고, 멀어질수록 선형으로 0까지 감소하는 함수 g를 정의한다(영향 범위는 하이퍼파라미터 J가 조절, 기본 J=5면 전후 약 10프레임). 학습 후 추론할 때, 국소 최댓값(local maximum)인 프레임 B와 양옆 A·C의 예측값을 이용해 삼각형의 꼭짓점(=정확한 시각)을 대수적으로 풀어낸다. 그 결과 프레임 간격에 무관한 임의 시간 해상도를 얻는다.</p>
<p>모델 구조는 <strong>4개의 서브모듈</strong>로 이루어진다: velocity 회귀, onset 회귀, frame 분류, offset 회귀. 각 서브모듈은 CRNN(합성곱 + 양방향 GRU)이다. 흥미로운 점은 서브모듈 간 <strong>조건화(conditioning)</strong> 다. velocity 출력이 onset 검출을 돕도록 연결되고(특히 여린 음 검출에 유리), onset·offset·frame 출력이 합쳐져 최종 frame 예측을 만든다. velocity 손실은 실제 onset이 있는 위치에서만 계산된다. 페달은 음과 별도로 학습되는 동일 구조의 서브모델(출력이 T×88 대신 T×1)이 onset·offset·frame을 예측한다.</p>
<p>라벨 정렬 강건성은 이 논문의 백미다. 오디오와 MIDI 라벨이 균일하게 ±50 ms 어긋난 상황에서, 이진 타깃은 봉우리가 평평해져 정확한 시각을 잃지만, 회귀 타깃은 컨볼루션 후에도 봉우리 위치가 보존되어 정밀 시각을 복원할 수 있음을 수식으로 보였다.</p>
<h2 id="방법론과-데이터">방법론과 데이터</h2>

<p><strong>라벨 정렬 강건성</strong>(라벨을 ±50 ms 무작위 이동)에서 차이는 극적이다. Onsets &amp; Frames의 note F1은 93.92% → 76.52%로 급락한 반면, 본 시스템은 96.72% → 96.39%로 거의 그대로였다. <strong>페달 채보</strong>(Table VI)에서는 pedal event(onset) F1 91.86%, pedal event w/ offset F1 86.58%를 기록하며 MAESTRO 최초 벤치마크를 세웠다. 시간 허용 오차를 5 ms로 좁혀도(Table IV) onset F1 65.32%로 Onsets &amp; Frames의 60.53%를 앞서, 진짜로 “고해상도”임을 입증했다. 회귀+해석적 후처리라는 패러다임은 이후 AMT 연구의 표준 도구가 되었다.</p>
<h2 id="한계와-비판">한계와 비판</h2>
<p>첫째, <strong>국소 최댓값 검출 방식 때문에 4프레임(40 ms)보다 짧은 연속 동일음을 분리하지 못한다</strong>(실제 연주에서는 드물지만 빠른 트레몰로 등에서 문제 가능). 둘째, 페달은 on/off 이진만 다루고 <strong>하프 페달(half-pedal)은 처리하지 못한다.</strong> 셋째, 오류 분석에서 드러나듯 옥타브 오류(배음을 거짓 음으로 인식)와 음정이 맞지 않거나 녹음 품질이 낮은 피아노에서 성능이 떨어진다. 넷째, 저자 스스로 밝히듯 <strong>실시간 응용에는 구조 수정이 필요</strong>하다(현 구조는 10초 클립 단위 처리). 다섯째, 학습 데이터가 MAESTRO(Yamaha Disklavier 중심)에 치우쳐 다른 피아노·녹음 환경으로의 일반화는 별도 검증이 필요하다. 그럼에도 정밀도, 강건성, 페달 지원, 공개 코드라는 강점으로 실무 표준으로 자리잡았다.</p>
