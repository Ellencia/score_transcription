<template id="doc-08_analysis" data-title="[08] TabCNN — 분석 보고서" data-docx="papers/08_Wiggins2019_TabCNN/분석_보고서.docx"><h1 id="guitar-tablature-estimation-with-a-convolutional-neural-network-tabcnn-분석-보고서">Guitar Tablature Estimation with a Convolutional Neural Network (TabCNN) 분석 보고서</h1>
<h2 id="핵심-요약">핵심 요약</h2>
<p>이 논문은 솔로 어쿠스틱 기타 연주 오디오로부터 <strong>기타 타브(tablature)</strong> 를 프레임 단위로 직접 추정하는 합성곱 신경망(Convolutional Neural Network, CNN) 모델 <strong>TabCNN</strong> 을 제안한다. 기존의 자동 타브 채보(automatic tablature transcription)는 보통 두 단계 — (1) 다중음 추정(multipitch estimation, 어떤 음높이들이 울리는지 알아내기), (2) 타브 운지 배치(tablature fingering arrangement, 그 음들을 어느 현·프렛으로 칠지 정하기) — 로 나뉘어 처리되었다. 두 번째 단계는 보통 “물리적으로 가장 치기 쉬운” 운지를 고르는 방식이라, 연주자가 실제로 사용한 운지와는 다를 수 있다는 한계가 있었다.</p>
<p>TabCNN의 핵심 통찰은 이 두 단계를 <strong>하나의 신경망으로 통합(joint learning)</strong> 한다는 점이다. 오디오에서 타브로 가는 매핑을 직접 학습함으로써, 모델은 데이터에 내재된 <strong>현별 음색 차이(string timbre)</strong> 와 <strong>물리적 연주 가능성 제약(playability constraints)</strong> 을 암묵적으로 활용해, 연주자가 실제로 친 운지를 추정한다. 같은 음높이를 여러 현·프렛 위치에서 칠 수 있다는 것이 기타 채보의 고유한 난제인데(논문 Figure 1), TabCNN은 음색 단서로 이를 구분하려 시도한다.</p>
<p>실험은 <strong>GuitarSet</strong> 데이터셋의 마이크 녹음으로 수행되었고, TabCNN은 다중음 추정에서 최신 베이스라인(Deep Salience, F-measure 0.646)을 크게 앞선 <strong>F-measure 0.826</strong> 을 기록했다. 또한 타브 채보 평가를 위한 표준 지표가 없던 상황에서 <strong>타브 평가 지표 세트(타브 정밀도·재현율·F-measure, 타브 명확화율 TDR)</strong> 를 새로 제안했다는 것이 이 논문의 또 다른 기여다. 이 지표들은 이후 FretNet 등 후속 연구의 사실상 표준 벤치마크가 되었다.</p>

<h2 id="상세-요약">상세 요약</h2>
<p>TabCNN은 표준 6현 어쿠스틱 기타의 솔로 연주 오디오에서 <strong>프레임 레벨(frame-level)</strong> 운지를 추정한다. 즉 약 23ms마다 “각 현이 어느 프렛에서 눌리는가”를 출력한다. 입력은 컴퓨터 비전 모델(AlexNet, VGGNet)에서 영감을 받은 CNN으로, 오디오를 이미지 형태로 변환한 <strong>Constant-Q Transform(CQT)</strong> 스펙트로그램을 받는다. CQT는 주파수 축을 음높이(pitch)에 대해 선형으로 배치하므로, 신경망이 음높이에 불변(pitch-invariant)인 특징을 학습하기에 유리하다.</p>
<p>학습 데이터는 <strong>GuitarSet</strong>(360개의 약 30초 솔로 연주, 6명의 기타리스트, 보사노바·록·펑크 등 다양한 스타일, soloing/comping 두 버전)이다. GuitarSet은 헥사포닉 픽업(hexaphonic pickup, 현마다 신호를 따로 받는 픽업)으로 현별 정답 음높이를 얻을 수 있어, 실제 운지(ground truth fretting)를 정확히 알 수 있다. 단, TabCNN의 입력은 헥사포닉이 아니라 <strong>단일 마이크 신호</strong> 뿐이다.</p>
<p>출력 구조가 영리하다. 기타에는 19개의 프렛이 사용되고, 현은 안 울리거나(closed), 개방현(open), 또는 19개 프렛 중 하나일 수 있으므로 현마다 <strong>21개 프렛 클래스</strong>가 존재한다. 따라서 모델은 6개 현 각각에 대해 21차원 소프트맥스(softmax) 확률분포를 출력한다 — 즉 6개의 동시 다중클래스 분류(multiclass classification) 문제로 본다. 손실 함수는 6개 현의 범주형 교차엔트로피(categorical cross-entropy)를 합산한 것이다.</p>

<p>TDR 0.899는 “정확히 맞힌 음높이 중 약 89%를 올바른 현·프렛에 배정했다”는 의미로, 같은 음을 여러 위치에서 칠 수 있다는 점을 고려하면 주목할 만한 결과다. 다중음·타브 모두 Precision이 Recall보다 높은데, 이는 시스템이 <strong>보수적(conservative)</strong> 으로 동작 — 없는 음을 만들어내기보다 있는 음을 놓치는 쪽의 오류가 더 잦다는 뜻이다. 특히 옥타브 차이 음에서 높은 음이 낮은 음의 배음(overtone)에 묻혀 누락되는 경우가 자주 관찰됐다.</p>
<p>이 논문의 학술적 의의는 두 가지다. 첫째, 다단계 파이프라인을 <strong>단일 종단간(end-to-end) CNN</strong> 으로 대체해 “실제 운지” 추정이라는 목표를 직접 학습 대상으로 삼은 첫 사례 중 하나다. 둘째, 타브 평가 지표(TP/TR/TF/TDR)를 정식화해 후속 연구의 <strong>공통 벤치마크 기반</strong>을 마련했다.</p>
<h2 id="한계와-비판">한계와 비판</h2>
<ul>
<li><p><strong>프렛/현 할당의 음색 의존성:</strong> TabCNN이 운지를 맞히는 핵심 단서는 현별 음색 차이지만, 음색만으로 현을 구분하기 어려운 경우(예: 같은 음을 인접 현에서 칠 때)에 미스-프레팅(miss-fretting) 오류가 발생한다. 논문 Figure 3에서도 B현 9프렛 음을 e현 4프렛으로 오배정하는 예가 제시된다.</p></li>
<li><p><strong>확장 주법(extended techniques) 미고려:</strong> 벤딩(bend), 슬라이드(slide), 비브라토(vibrato) 등 <strong>음높이 변조(pitch modulation)</strong> 가 들어가는 연주 기법을 표현하지 못한다. 출력이 정수 프렛 클래스로 양자화되어 있어 연속적 음높이 변화를 담을 수 없다. 이 한계는 곧바로 후속 연구 FretNet(연속값 음높이 윤곽)의 출발점이 된다.</p></li>
<li><p><strong>프레임 레벨, 노트 레벨 아님:</strong> 출력이 프레임 단위 운지일 뿐, 음표(note) 단위로 묶어내는 시간적 평활화(temporal smoothing)나 온셋(onset) 검출이 없다. 음표 시작·끝 부근에서 오류가 잦으며, 논문도 후속 작업으로 평활화를 제안한다.</p></li>
<li><p><strong>클린 벤치마크 vs 실음원:</strong> 모든 결과는 깨끗하게 녹음된 솔로 어쿠스틱 기타(GuitarSet) 한정이다. 일렉 기타, 앰프·이펙트가 걸린 음원, 다른 악기가 섞인 실제 곡에서는 성능이 크게 낮아질 것으로 예상되며, 논문은 이를 검증하지 않았다.</p></li>
<li><p><strong>단일 데이터셋 일반화:</strong> GuitarSet 한 가지로 학습·평가했으므로, 6명 기타리스트와 표준 튜닝·어쿠스틱이라는 좁은 분포를 벗어나면 일반화가 보장되지 않는다. 이 데이터 부족 문제는 Riley(2024)와 GAPS(2024) 등 후속 연구가 본격적으로 파고드는 주제다.</p></li>
</ul>
