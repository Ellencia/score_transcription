<h2 id="핵심-요약">핵심 요약</h2>
<p>이 논문은 <strong>데이터 부족</strong> 이라는 기타 자동 채보(AMT)의 근본 문제를 <strong>도메인 적응(domain adaptation)</strong> 으로 우회한다. 피아노 채보는 MAESTRO·MAPS 같은 대규모 고품질 데이터셋 덕에 정확도가 매우 높지만, 기타에는 그에 견줄 데이터셋이 없다. 저자들은 <strong>상용 악보-오디오 쌍(score-audio pairs)</strong> 을 활용해, 점수(score)를 채보 모델의 활성화(activation)에 정렬(alignment)함으로써 기타용 학습 데이터를 생성하는 접근을 정교화한다.</p>
<p>핵심은 <strong>고해상도 피아노 채보 모델(Kong et al.의 ByteDance 모델)</strong> 을 출발점으로 삼아 기타 채보 모델을 학습시키는 것이다. 선행 방법(Maman &amp; Bermano)이 Onsets and Frames를 썼던 것을 고해상도 피아노 모델로 교체했는데, 이 모델이 라벨 정렬 오차에 대한 내성(tolerance)이 더 좋아 정확도가 향상된다. 정렬에는 2단계(거친 정렬 후 화음 내 비동시성을 해소하는 미세 정렬) 절차를 쓴다.</p>
<p>결과적으로 이 모델은 <strong>GuitarSet 제로샷(zero-shot) 설정에서 onset F1 87.3%</strong> 라는 당시 최고 성능(state-of-the-art)을 달성했다 — 즉 GuitarSet을 전혀 학습에 쓰지 않고도 기존 발표 방법들을 능가했다. GuitarSet을 학습에 포함한 지도(supervised) 설정에서는 <strong>F1 89.7%</strong> 로, 최고 모델 대비 2% 이내로 근접했다. 단, 이 모델은 <strong>프렛/현을 출력하지 않으며</strong>(음표 온셋만 추정), 확장 주법(extended techniques)도 다루지 않는다.</p>

<h2 id="상세-요약">상세 요약</h2>
<p>기타에는 GuitarSet 외에 정렬된 주석(aligned annotation)이 거의 없어, 기존 연구는 GuitarSet의 정해진 train/test split에 의존해 왔다. 저자들은 이 병목을 깨기 위해 <strong>상용 악보-오디오 쌍</strong>(저작권이 명확한 François Leduc의 재즈 기타 채보집 등)을 학습 자원으로 끌어온다. 문제는 악보의 음표 타이밍과 실제 연주 타이밍이 정확히 일치하지 않는다는 점인데, 이를 <strong>점수-활성화 정렬(score-to-activation alignment)</strong> 로 해결한다.</p>
<p>정렬은 2단계다. 1단계(거친 정렬)는 악보를 합성 오디오로 만들어 모델 활성화에 맞춘다. 2단계(미세 정렬)는 화음에서 동시에 적힌 음들이 실제 연주에서는 미세하게 어긋나는 비동시성(asynchrony)을 해소하고, 각 음표 온셋을 활성화의 국소 최댓값(local maximum)에 맞춘다(선행 연구 부록 A.1.2 절차 차용).</p>
<p>이 정렬 파이프라인의 백본으로 <strong>Kong et al.의 고해상도 피아노 채보 모델</strong> 을 쓴다. 이는 ByteDance가 발표한 모델로, 온셋·오프셋 시각을 회귀(regression)로 추정해 10ms 해상도를 유지하는 CRNN(합성곱 순환 신경망)이다. 이 모델은 선행 방법이 쓴 Onsets and Frames보다 라벨 정렬 오차에 강건해, 다소 부정확한 정렬 라벨로도 더 잘 학습된다. 저자들은 이 모델을 자신들의 정렬 데이터(FL)와 GuitarSet(GS)을 조합해 학습시키고, 세 가지 설정 — GuitarSet test split(지도), 전체 GuitarSet(제로샷), 자체 재즈 기타 test split — 에서 평가한다.</p>

<p>학술적 의의: 피아노에서 잘 작동하는 대규모 사전학습 자원을, 정렬 기반 도메인 적응으로 <strong>기타로 전이</strong>해 데이터 부족을 우회하는 실용적 레시피를 제시했다. 제로샷 SOTA는 “한 곡도 GuitarSet으로 학습하지 않고도 그 데이터셋에서 최고”라는 점에서 일반화 측면의 강한 신호다.</p>
<h2 id="한계와-비판">한계와 비판</h2>
<ul>
<li><p><strong>프렛/현 미출력:</strong> 이 모델은 음표 온셋(음높이+시작 시각)만 추정하며, <strong>어느 현·프렛에서 쳤는지는 출력하지 않는다.</strong> 따라서 엄밀히 말하면 ’타브 채보’가 아니라 ’음표 채보’다. TabCNN/FretNet과 같은 ’타브’를 직접 비교하기엔 출력 형식이 다르다는 점에 유의해야 한다.</p></li>
<li><p><strong>확장 주법 제외:</strong> 벤딩·슬라이드·비브라토 등 음높이 변조 주법을 명시적으로 다루지 않는다. 출력은 명목 음 온셋 수준이다.</p></li>
<li><p><strong>오프셋·벨로시티 미평가:</strong> 평가가 onset-only(50ms)에 한정된다. 음의 길이(오프셋)와 세기(벨로시티)는 다루지 않아, 완전한 연주 채보로는 정보가 부족하다.</p></li>
<li><p><strong>클린 GuitarSet 벤치마크의 한계:</strong> 보고된 87.3%/89.7%는 모두 <strong>깨끗한 GuitarSet</strong> 기준이다. 자체 재즈 기타 9곡에서 일반화 우위를 보였다고는 하나, 폭넓은 실음원(다양한 일렉 기타 톤, 강한 이펙트, 밴드 합주 분리 후 음원 등)에 대한 체계적 검증은 아니다. 실제 야생 음원 성능은 이보다 낮다고 보는 것이 합리적이다.</p></li>
<li><p><strong>상용 악보 의존:</strong> 학습 자원이 저작권 있는 상용 악보-오디오 쌍에 의존한다. 공개된 것은 79개 주석으로 제한적이며, 정렬 품질은 악보-연주의 충실도에 좌우된다. 정렬 오차가 큰 즉흥 연주나 악보와 크게 다른 해석에는 적용이 어려울 수 있다.</p></li>
<li><p><strong>피아노 모델 전이의 도메인 격차:</strong> 피아노와 기타는 배음 구조·음색·연주 기법이 다르므로, 피아노 사전학습 모델의 귀납적 편향이 기타의 특수성(특히 주법)을 완전히 포착하지는 못한다.</p></li>
</ul>
