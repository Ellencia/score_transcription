<template id="doc-05_explanation" data-title="[05] MT3 — 비전공자 해설" data-docx="papers/05_Gardner2022_MT3/비전공자_해설.docx"><h1 id="mt3-multi-task-multitrack-music-transcription-비전공자-해설">MT3: Multi-Task Multitrack Music Transcription — 비전공자 해설</h1>
<h2 id="이-논문이-풀려는-문제는-무엇인가">이 논문이 풀려는 문제는 무엇인가</h2>
<p>앞선 연구(Hawthorne 2021)는 <strong>피아노 한 대</strong>의 연주를 악보로 받아 적는 데 성공했습니다. 그런데 실제 음악은 보통 여러 악기가 동시에 울립니다 — 밴드라면 기타, 베이스, 드럼, 건반이 한꺼번에 섞이죠. 채보기에게 진짜 어려운 건 이 <strong>뒤섞인 소리에서 “어느 악기가 무슨 음을 언제 쳤는지” 동시에 분리해 받아 적는 일</strong>입니다.</p>
<p>여기에 또 하나의 골칫거리가 있습니다. <strong>데이터가 너무 적습니다.</strong> 전문 음악가조차 채보가 오래 걸리고 어렵기 때문에, 악기별로 정답이 달린 음악 데이터셋은 매우 빈약합니다. 특히 기타 데이터는 3시간, 합주(URMP) 데이터는 고작 1.3시간뿐입니다. 이렇게 적은 데이터로는 좋은 모델을 못 만든다는 게 통념이었죠.</p>
<p>MT3는 이 두 문제를 한 번에 공격합니다. <strong>“악기마다 따로 모델을 만들지 말고, 여러 악기·여러 데이터셋을 한 모델에 몽땅 섞어 가르치자.”</strong></p>
<h2 id="한-줄-비유로-본-핵심">한 줄 비유로 본 핵심</h2>
<p><strong>“다국어를 함께 배우면 희귀 언어 실력도 는다.”</strong> 한 사람이 영어·스페인어·라틴어를 같이 배우면, 데이터가 적은 라틴어 실력이 영어 덕분에 덩달아 좋아집니다. MT3도 마찬가지로 피아노·기타·합주를 한 모델에 함께 가르치자, 데이터가 빈약한 기타와 합주의 채보 실력이 <strong>극적으로</strong> 좋아졌습니다.</p>
<h2 id="핵심-아이디어를-한-그림으로">핵심 아이디어를 한 그림으로</h2>
<pre class="mermaid"><code>flowchart LR
    A[&quot;🎹 피아노 데이터&quot;] --&gt; M[&quot;하나의 번역 모델\n(MT3)&quot;]
    B[&quot;🎸 기타 데이터(소량)&quot;] --&gt; M
    C[&quot;🎻 합주 데이터(극소량)&quot;] --&gt; M
    D[&quot;🥁 다악기 데이터&quot;] --&gt; M
    M --&gt; E[&quot;악기별로 분리된\n음표 받아쓰기&quot;]</code></pre>
<p>여러 종류의 데이터를 한 솥에 넣고 함께 끓이면, 데이터가 적은 악기가 풍부한 악기의 “공통 지식”을 빌려 씁니다.</p>

<h2 id="어떻게-작동하는가">어떻게 작동하는가</h2>
<ol type="1">
<li><p><strong>여러 데이터셋을 한 솥에</strong>: 피아노만 있는 MAESTRO(약 200시간), 다악기 합성곡 Slakh(약 968시간), 기타(3시간), 합주(1.3시간) 등 6개 데이터셋을 함께 사용합니다.</p></li>
<li><p><strong>불균형 바로잡기</strong>: 그냥 섞으면 데이터가 많은 피아노만 잘 배우게 됩니다. 그래서 <strong>데이터가 적은 셋을 일부러 더 자주 뽑아</strong> 학습 기회를 균형 있게 줍니다(온도 샘플링).</p></li>
<li><p><strong>“악기 꼬리표”로 구분</strong>: 출력 토큰에 <strong>악기 토큰</strong>을 추가한 게 핵심 발명입니다. “여기서부터는 기타”, “여기서부터는 베이스” 식으로 꼬리표를 달면, 한 모델이 어떤 악기 조합이든 같은 방식으로 받아 적을 수 있습니다. 표준 MIDI의 128가지 악기 번호를 그대로 빌려 썼습니다.</p></li>
<li><p><strong>긴 음 잇기</strong>: 곡을 약 2초 단위로 잘라 처리하다 보면 한 음이 두 구간에 걸칠 수 있습니다. 각 구간 시작에서 “이미 울리고 있는 음”을 먼저 선언하게 해서(타이 섹션) 음이 어색하게 끊기지 않도록 합니다.</p></li>
<li><p><strong>결과</strong>: 한 번 학습된 단일 모델이 피아노든 기타든 4중주든, 입력만 주면 악기별로 분리된 MIDI를 출력합니다.</p></li>
</ol>
<h2 id="왜-중요한가">왜 중요한가</h2>
<p>가장 인상적인 성과는 <strong>저자원 악기의 부활</strong>입니다. 데이터가 1.3시간뿐인 합주(URMP)에서 채보 정확도(Onset+Offset F1)가 혼자 배울 때보다 <strong>263% 뛰었고</strong>, 클래식 합주(MusicNet)는 54%, 기타는 19.5% 좋아졌습니다. 반면 데이터가 넘치는 피아노는 약 5%만 손해 봤습니다 — 잃은 것보다 얻은 게 압도적으로 큽니다. MT3는 6개 데이터셋 전부에서 당시 최고 기록과 상용 도구(Melodyne)를 모두 넘어섰습니다.</p>
<p>또한 MT3는 채점 방식 자체도 개선했습니다. 기존 지표는 “음을 맞혔는가”만 봤지만, 다중악기에서는 <strong>“그 음을 친 악기까지 맞혔는가”</strong>가 중요합니다. 그래서 저자들은 악기 일치까지 따지는 더 엄격한 <strong>다중악기 F1</strong>을 새로 제안했습니다.</p>
<p>결국 MT3는 “악기마다 전용 모델을 만든다”는 시대를 끝내고, <strong>하나의 범용 모델이 모든 악기를 받아 적는</strong> 새 방향을 열었습니다. 이 틀은 곧 보컬까지 직접 받아 적는 <strong>YourMT3+</strong>로 발전하게 됩니다 — MT3는 그 다리 역할을 한 셈입니다.</p>
