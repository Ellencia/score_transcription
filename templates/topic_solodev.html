<blockquote>
<p>AMT 리서치 아카이브 종합문서 · 작성 2026-06-21 출처: AMT 통합 마스터 보고서 v2 §5 (솔로 개발자 경쟁 분석) 대상: 오디오 → 악보/기타 탭 변환 도구를 만들려는 솔로/소규모 개발자 톤: 정직하고 실행 가능하게.</p>

<h2 id="한-문장-전략">한 문장 전략</h2>
<p><strong>모델을 학습하지 마라. 인커번트의 카탈로그와 싸우지 마라. 무료 사전학습 모델을 wrapping하고, 모두가 약한 노테이션 last mile과 큐레이션된 니치에 노력을 쏟아라.</strong> 인커번트의 진짜 해자는 AI가 아니라 콘텐츠+커뮤니티+라이선싱이고, 빅테크는 채보를 오픈소스로 풀어 버린다. 그 틈이 솔로 개발자의 자리다.</p>

<h2 id="넘을-수-없는-장벽-시도하지-말-것">1. 넘을 수 없는 장벽 (시도하지 말 것)</h2>
<p>솔로 개발자가 정면으로 싸우면 반드시 지는 세 영역이다. 마스터 보고서의 핵심 통찰은, 인커번트(Ultimate Guitar, Songsterr)의 해자가 <strong>AI가 아니라 콘텐츠+커뮤니티+라이선싱</strong>이라는 점이다.</p>
<p><strong>(a) 콘텐츠 라이브러리 &amp; 라이선싱.</strong> Ultimate Guitar는 검수된 무료 사용자 탭만 약 140만 개(전체 텍스트 탭+코드 200만+), 월 6,000만+ 방문이다. 이 카탈로그는 자동 채보가 아니라 <strong>사람이 수작업으로 만든 크라우드소싱 탭 + 퍼블리셔 라이선스</strong>다. Songsterr도 공식 FAQ에서 “모든 탭은 사용자가 기여하며, 우리가 직접 채보하지 않는다”고 못박는다. 게다가 UG는 MuseScore·Audacity·Hal Leonard(최대 악보 퍼블리셔)까지 수직 통합해 학습→기보→출판→라이선싱 funnel을 장악했다. 100만+ 탭 크라우드소싱이나 Hal Leonard/Sony 퍼블리셔 딜은 솔로가 복제 불가능하다. <strong>카탈로그로 경쟁하지 마라.</strong></p>
<p><strong>(b) Foundation model 학습.</strong> 대규모 페어 데이터(비피아노는 희소)와 막대한 컴퓨트가 필요하다. 기타만 봐도 GuitarSet은 360발췌 클린뿐이고 DadaGP는 오디오가 없다 — 처음부터 학습할 데이터 자체가 없다. <strong>처음부터 학습하지 마라.</strong></p>
<p><strong>(c) 유통/SEO.</strong> 인커번트가 “[곡명] tab” 검색과 앱스토어를 장악했다. 신규 진입자가 검색 유입으로 이기기 어렵다.</p>
<h2 id="낮아진-장벽-당신의-기회">2. 낮아진 장벽 (당신의 기회)</h2>
<p>반대로 두 영역은 솔로에게 활짝 열려 있다.</p>
<p><strong>(a) 모델은 무료·사전학습이다.</strong> basic-pitch(07), ByteDance(02), YourMT3+(06), FretNet(09)이 전부 오픈소스다. 빅테크(Spotify·Google·ByteDance)는 채보를 직접 수익화하지 않고 오픈소스로 풀어 생태계 영향력을 확보하며, 그 무료 엔진이 상용 제품의 부품이 된다(basic-pitch → NeuralNote가 증거). 추론은 곡당 몇 센트, 또는 CPU로 공짜다. 즉 <strong>모델이라는 가장 비싼 부품을 빅테크가 무료로 대주는</strong> 셈이다.</p>
<p><strong>(b) 노테이션 last mile이 미완성이다.</strong> MIDI를 읽을 수 있는 악보로 바꾸는 일(양자화·성부 분리·프렛 할당·표기)은 <strong>상용 제품을 포함해 모두가 약하다.</strong> AnthemScore는 멀티트랙을 한 보표에 쏟고, ScoreCloud는 음악 이론 지식을 요구하며, 사용자는 결국 MuseScore로 리듬을 손본다. 이 craft 문제가 솔로 개발자가 더 잘할 수 있는 지점이다.</p>
<h2 id="공략-가능한-니치">3. 공략 가능한 니치</h2>
<p>마스터 보고서가 꼽은 다섯 니치 축이다. 좁힐수록 인커번트의 규모 우위가 무력해진다.</p>

<p>특히 마지막 축이 중요하다. <strong>과대약속을 하지 마라.</strong> Soundslice 창업자가 ChatGPT가 없는 기능을 안내해 곤란을 겪은 일화의 교훈처럼, “버튼 한 번에 완벽한 탭”을 약속하면 실망을 부른다. confidence가 낮을 때 사용자에게 묻는 교정 루프 UX가 정직하고 실제로 더 강하다.</p>
<h2 id="전략적-통찰-왜-이-틈이-존재하는가">4. 전략적 통찰 — 왜 이 틈이 존재하는가</h2>
<p>세 가지 구조적 사실이 솔로 개발자의 기회를 만든다.</p>
<p><strong>(1) 인커번트의 해자는 콘텐츠+커뮤니티이지 AI가 아니다.</strong> 그들은 자동 채보로 카탈로그를 만든 게 아니라 20년간 크라우드소싱과 라이선싱으로 쌓았다. 즉 그들의 강점은 AI 기술 우위가 아니어서, <strong>기술로는 따라잡을 게 별로 없다</strong>. 역으로 그들도 AI 노테이션 품질에서 특별히 앞서 있지 않다.</p>
<p><strong>(2) 빅테크는 채보를 오픈소스로 풀어 버린다.</strong> Spotify·Google·ByteDance에게 채보는 수익원이 아니라 연구 평판·생태계 영향력의 도구다. 그래서 최고 수준의 엔진이 무료로 풀린다 — 솔로 개발자가 그 엔진을 그대로 부품으로 쓴다. <strong>가장 비싼 R&amp;D를 거대 기업이 대신 해주고 공짜로 배포한다.</strong></p>
<p><strong>(3) 상용 수익 축이 B2C 앱 → B2B API로 이동 중이고, 차별화 축은 “정확도 → 워크플로 통합”으로 이동했다.</strong> 정확도는 오픈 모델로 상향평준화됐으니, 경쟁은 “결과를 어떤 맥락(학습·작곡·DAW·노래방)에 끼우느냐”로 옮겨갔다. 이 워크플로 craft가 바로 솔로가 잘할 수 있는 영역이다.</p>
<p>결론: <strong>넘을 수 없는 벽(콘텐츠·foundation 학습·유통)은 피하고, 빅테크가 무료로 푼 모델 위에서 모두가 약한 노테이션 last mile과 좁은 니치를 공략하라.</strong> AMT 채보는 사용자 제공 오디오를 처리하는 도구일 때 카탈로그 호스팅보다 저작권상으로도 안전하다(MXTabs 폐쇄 사례 — 카탈로그 구축형은 퍼블리셔 소송 리스크).</p>
<h2 id="계획-변경-트리거-언제-피벗할까">5. 계획 변경 트리거 (언제 피벗할까)</h2>
<p>정직한 로드맵에는 출구도 있어야 한다. 다음 신호가 보이면 전략을 바꾼다.</p>
<ul>
<li><strong>MuseScore NoteVision/Klangio가 우수한 무료 기타-탭-from-audio를 내면</strong> → 더 얇은 니치(장르/언어/워크플로)나 순수 툴/UX로 피벗.</li>
<li><strong>대규모 페어 audio↔︎TAB 데이터를 구축·확보하면</strong> → 특화 모델 학습이 그 자체로 해자가 됨(이때만 학습이 정당화됨).</li>
<li><strong>니치 커뮤니티(예: 채보 포럼)가 지불 의향을 보이면</strong> → 커뮤니티+큐레이션에 집중(인커번트 해자 중 솔로가 작게 복제 가능한 유일한 부분).</li>
</ul>
<h2 id="종합-솔직한-결론">종합: 솔직한 결론</h2>
<p>솔로 개발자가 이길 수 있는 게임은 명확하다. 모델은 빌리고(빅테크가 무료로 줌), 카탈로그·유통은 포기하고(인커번트가 장악), <strong>노테이션 last mile의 craft와 좁고 깊은 니치 커뮤니티</strong>에 전부를 건다. 추론 비용은 곡당 몇 센트로 무시할 만하고, 진짜 자산은 양자화·프렛 할당·편집 UX에 쏟은 시간과 큐레이션된 니치다. 이것이 거대 기업과 인커번트 사이의 좁지만 실재하는 틈이다.</p>
