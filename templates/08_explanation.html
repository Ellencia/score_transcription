<h2 id="이-논문이-풀려는-문제는-무엇인가">이 논문이 풀려는 문제는 무엇인가</h2>
<p>기타 악보 중에는 <strong>타브(tablature, TAB)</strong> 라는 것이 있습니다. 오선지 악보가 “어떤 음을 칠지”만 알려준다면, 타브는 한 발 더 나아가 “<strong>여섯 줄 중 어느 줄을, 몇 번째 칸(프렛)에서 누를지</strong>”까지 그림처럼 알려줍니다. 기타리스트들이 인터넷에서 곡을 배우고 공유할 때 압도적으로 많이 쓰는 방식이죠.</p>
<p>그런데 여기에 기타만의 골치 아픈 문제가 있습니다. <strong>똑같은 음을 여러 군데서 칠 수 있다</strong>는 점입니다. 예를 들어 ‘미(E)’ 음 하나를 4번 줄 2번 칸에서 칠 수도 있고, 5번 줄 7번 칸에서 칠 수도 있습니다. 소리의 높이는 같지만, 어느 자리에서 치느냐에 따라 음색과 손가락 움직임이 달라집니다. 그래서 “이 소리는 어느 음인가?”를 맞히는 것만으로는 부족하고, “<strong>연주자가 실제로 어느 줄·칸에서 쳤는가?</strong>”까지 알아내야 진짜 타브가 됩니다.</p>
<p>기존 방법은 이 일을 두 단계로 쪼개서 했습니다. 먼저 “무슨 음들이 울리는지” 알아내고, 그다음 “그 음들을 가장 치기 편한 자리에 배치”했죠. 문제는 두 번째 단계가 ’편의성’만 따지다 보니, 연주자가 실제로 친 자리와 다른 답을 내놓기 일쑤였다는 겁니다.</p>
<h2 id="한-줄-비유로-본-핵심">한 줄 비유로 본 핵심</h2>
<p>받아쓰기로 비유하면, 기존 방식은 “단어를 알아들은 뒤 사전에서 가장 흔한 철자로 적는” 식이라 화자가 실제로 쓴 철자와 어긋날 수 있었습니다. <strong>TabCNN은 소리의 미묘한 ’말투(음색)’까지 듣고 화자가 실제로 쓴 철자를 한 번에 받아쓰는 비서</strong>입니다.</p>

<h2 id="어떻게-작동하는가">어떻게 작동하는가</h2>
<ol type="1">
<li><p><strong>소리를 그림으로 바꾼다.</strong> 기타 녹음을 CQT라는 방식으로 변환하면, 가로축은 시간, 세로축은 음높이인 이미지가 됩니다. 음높이가 세로축에 가지런히 놓이게 만든 게 포인트입니다.</p></li>
<li><p><strong>CNN이 그림을 본다.</strong> CNN은 원래 사진 속 고양이·강아지를 알아보는 데 쓰이는 AI인데, 여기선 소리 그림 속에서 “어떤 줄·칸 조합일 때 나타나는 무늬”를 학습합니다. 같은 음이라도 어느 줄에서 쳤느냐에 따라 배음(딸려 나오는 소리) 무늬가 미묘하게 다른데, CNN이 그 차이를 단서로 삼습니다.</p></li>
<li><p><strong>여섯 줄을 동시에 답한다.</strong> 모델은 매 순간 6개 줄 각각에 대해 “안 침 / 개방현 / 1칸 / 2칸 / … / 19칸” 중 무엇인지 골라냅니다. 줄마다 21개 선택지가 있는 셈입니다.</p></li>
<li><p><strong>데이터.</strong> GuitarSet이라는, 줄별 소리를 따로 녹음할 수 있는 특수 픽업으로 만든 데이터셋을 씁니다. 덕분에 “실제로 어느 줄·칸에서 쳤는지” 정답을 정확히 알 수 있어, AI를 올바르게 가르칠 수 있습니다.</p></li>
</ol>
<p>결과적으로 TabCNN은 음높이 맞히기에서 종합 점수 <strong>0.826</strong>(기존 베이스라인 0.646보다 훨씬 높음)을, 줄·칸 자리 맞히기에서 <strong>0.748</strong>을 기록했고, 음을 맞힌 것 중 <strong>약 89%</strong>(TDR 0.899)는 자리까지 제대로 맞혔습니다. 다만 이 점수들은 <strong>깨끗하게 녹음된 솔로 어쿠스틱 기타</strong>에서 나온 것이라, 앰프·이펙트가 걸린 일렉 기타나 밴드 합주가 섞인 실제 노래에서는 더 낮아진다는 점을 기억해야 합니다.</p>
<h2 id="왜-중요한가">왜 중요한가</h2>
<p>TabCNN은 “음 알아내기”와 “자리 정하기”를 하나의 AI로 합친 초기 대표작입니다. 무엇보다, <strong>타브가 얼마나 잘 만들어졌는지를 재는 점수표(평가 지표)</strong> 를 처음으로 정리해 제시했습니다. 이후 거의 모든 기타 타브 AI 연구가 이 점수표 위에서 자기 성능을 비교하게 되었죠.</p>
<p>동시에 한계도 분명했습니다. 기타리스트들이 즐겨 쓰는 <strong>벤딩(줄을 밀어 음을 휘게 하기), 슬라이드, 비브라토</strong> 같은 표현 기법은 음높이가 미끄러지듯 변하는데, TabCNN은 음을 딱딱 끊어진 칸으로만 표현하니 이런 ’미끄러짐’을 담지 못합니다. 바로 이 빈틈을 메우려고 나온 후속 연구가 <a href="https://arxiv.org/abs/2212.03023">FretNet</a>입니다. TabCNN은 그 출발점이자, 오늘날 기타 AI 채보가 서 있는 기반을 닦은 디딤돌이라 할 수 있습니다.</p>
