<h2 id="핵심-원칙-모델은-빌리고-노력은-last-mile에-쏟아라">핵심 원칙: 모델은 빌리고, 노력은 last mile에 쏟아라</h2>
<p>실무 의사결정의 출발점은 단순하다. <strong>채보 엔진(모델)은 이미 오픈소스로 상향평준화됐으니 직접 학습하지 말고 가져다 쓰고, 진짜 노력은 MIDI를 사람이 읽는 악보로 바꾸는 last mile — 리듬 양자화와 프렛/현 할당, 그리고 편집 UI — 에 쏟아라.</strong> 추론 비용은 곡당 몇 센트에 불과하고, 진짜 해자는 노테이션 품질과 워크플로에서 나온다.</p>

<h2 id="audio-midi-score-파이프라인">2. audio → MIDI → score 파이프라인</h2>
<p>채보의 표준 파이프라인은 다섯 단계다. 핵심은 <strong>모델 추론까지는 쉽고, 그 뒤 양자화·악보화가 진짜 일</strong>이라는 점이다.</p>
<pre><code>오디오 입력 (wav/mp3)
   ↓ [선택] 음원 분리 — Demucs v4 (악기별 stem)
   ↓ 특징 추출 — librosa / torchaudio (CQT, log-mel)
   ↓ 모델 추론 — basic-pitch / ByteDance / YourMT3+ / FretNet
   ↓ MIDI 생성 (음 시작·길이·피치·velocity)
   ↓ 리듬 양자화 / 비트 트래킹  ★최대 병목★
   ↓ MusicXML / GuitarPro → 악보·탭 렌더 (music21 + MuseScore / alphaTab)</code></pre>
<p>단일 악기에 강한 모델(basic-pitch)을 쓸 때의 핵심 패턴은, 앞단에 <strong>Demucs로 stem을 분리</strong>한 뒤 stem별로 채보해 합치는 것이다. 이렇게 하면 멀티악기 곡도 단일악기 모델로 처리할 수 있다.</p>
<p>OMR(이미지 입력)은 앞단만 다르다: 이미지 → (dewarp 보정) → staff 검출 → 기호 인식(세그멘테이션 또는 seq2seq) → MusicXML. 출력단(에디터·재생)은 오디오 채보와 공유한다.</p>
<h2 id="두-개의-병목-리듬-양자화와-프렛-할당">3. 두 개의 병목: 리듬 양자화와 프렛 할당</h2>
<p>마스터 보고서가 일관되게 지목하는 두 약한 고리다. 모든 도구(상용 포함)가 여기서 약하고, 그래서 솔로 개발자가 가치를 더할 수 있는 곳이다.</p>
<h3 id="병목-a-리듬-양자화-rhythm-quantization">병목 A — 리듬 양자화 (rhythm quantization)</h3>
<p>채보 MIDI는 사람 연주의 미세한 밀고 당김을 그대로 담아 타이밍이 불규칙하다. 이를 정확한 박·음표 길이(4분음표·8분음표 등)로 정돈하지 않으면 악보가 읽기 어렵게 지저분해진다. 손으로 그린 들쭉날쭉한 선을 격자에 맞춰 곧게 펴는 일과 같다. <strong>악보 가독성의 핵심 병목</strong>이며, AnthemScore조차 멀티트랙을 한 보표에 쏟고, 사용자는 결국 MuseScore로 리듬을 손본다. neural beat-tracking 기반 양자화 연구를 차용하는 것이 개선 경로다. DTW/score-following 경험이 이 양자화에 직결된다.</p>
<h3 id="병목-b-프렛현-할당-fretstring-assignment">병목 B — 프렛/현 할당 (fret/string assignment)</h3>
<p>기타 탭 고유의 난제다. 한 음높이를 여러 (현, 프렛) 조합으로 칠 수 있어 오디오만으로는 위치 구분이 거의 불가능하다. 그래서 <strong>탭 F는 항상 multipitch F보다 낮다</strong>(음은 맞혀도 위치에서 점수를 잃는다). 측정지표는 TDR(맞은 피치 중 현/프렛까지 맞춘 비율)이다. 해법 알고리즘은 세 갈래다.</p>
<ul>
<li><strong>HMM/Viterbi + 운지 전환 비용</strong>: 손이 한 위치에서 다음 위치로 옮기는 비용을 최소화하는 경로를 찾는다.</li>
<li><strong>그래프 최단경로</strong>: 가능한 운지들을 그래프로 놓고 가장 짧은(연주하기 쉬운) 경로를 고른다.</li>
<li><strong>신경망 inhibition</strong>: 물리적으로 불가능한 현 중복을 억제한다.</li>
</ul>
<blockquote>
<p>⚠️ 오디오→렌더링된 탭까지의 end-to-end 오픈소스는 없다. 모든 성숙한 레포(FretNet/amt-tools 등)는 “오디오→음/현 데이터”에서 멈춘다. 따라서 [채보 모델] → [프렛 할당] → [GuitarPro/MusicXML 생성] → [alphaTab 렌더]의 3단 조립이 유일한 현실 경로다.</p>
</blockquote>

<h2 id="종합-권장-스택">종합: 권장 스택</h2>
<p>오디오→기타 탭을 만든다면 가장 검증된 조합은 다음이다.</p>
<pre><code>Demucs (분리) → FretNet/basic-pitch (채보) → 프렛 할당(HMM/그래프)
→ music21 (양자화·MusicXML/GP 생성) → alphaTab (브라우저 탭 렌더+재생)</code></pre>
<p>GPU는 Demucs·ByteDance·YourMT3+ 추론에 속도 이점이 있으나 필수는 아니며(basic-pitch는 CPU 충분), 비용은 곡당 몇 센트 수준이다. 지배적 비용은 모델이 아니라 <strong>양자화·프렛 할당·편집 UI에 들이는 개발 시간</strong>이며, 바로 거기서 경쟁우위가 쌓인다.</p>
