<h2 id="이-논문이-풀려는-문제는-무엇인가">이 논문이 풀려는 문제는 무엇인가</h2>
<p>피아노 연주를 녹음한 음원 파일이 있다고 해봅시다. 우리가 원하는 건 “어느 시점에, 어떤 건반을, 얼마나 세게, 얼마나 오래 눌렀는가”를 정확히 받아 적은 <strong>악보(혹은 MIDI)</strong>입니다. 사람이 귀로 듣고 손으로 옮겨 적는 이 작업을 컴퓨터에게 시키는 것이 자동 음악 채보(Automatic Music Transcription)입니다.</p>
<p>문제는, 그동안 이걸 잘하는 프로그램들이 하나같이 <strong>음악 전용으로 손수 깎아 만든 복잡한 기계</strong>였다는 점입니다. “음이 시작되는 순간을 잡는 부품”, “음이 울리고 있는 구간을 잡는 부품”, “세기를 잡는 부품”을 따로 만들고, 그 출력들을 “이럴 땐 음을 시작하고 저럴 땐 무시한다” 같은 규칙으로 일일이 짜맞춰야 했습니다. 성능은 좋았지만, 새 기능 하나 붙이려면 기계 전체를 다시 설계해야 하는 구조였죠.</p>
<p>이 논문은 정반대의 질문을 던집니다. <strong>“굳이 음악 전용 기계를 만들 필요가 있을까? 번역기를 그대로 가져다 쓰면 안 될까?”</strong></p>
<h2 id="한-줄-비유로-본-핵심">한 줄 비유로 본 핵심</h2>
<p><strong>채보를 “외국어 번역”처럼 다룬다.</strong> 영어 문장을 한국어 문장으로 옮기듯, 이 모델은 “소리(스펙트로그램)”라는 언어를 “음표 기호(MIDI 토큰)”라는 언어로 번역합니다. 번역에 쓰이는 도구는 구글 번역기와 같은 계열의 범용 Transformer입니다 — 음악용으로 개조하지 않은, 그냥 “기성품” 번역 모델이죠.</p>
<h2 id="핵심-아이디어를-한-그림으로">핵심 아이디어를 한 그림으로</h2>
<pre class="mermaid"><code>flowchart LR
    A[&quot;🎹 피아노 소리&quot;] --&gt; B[&quot;소리 그림\n(스펙트로그램)&quot;]
    B --&gt; C[&quot;번역기\n(Transformer)&quot;]
    C --&gt; D[&quot;음표 받아쓰기\n(시작·세기·길이 토큰)&quot;]
    D --&gt; E[&quot;🎼 악보 / MIDI&quot;]</code></pre>
<p>소리를 잘게 쪼개 “소리 그림”으로 바꾸고, 그걸 번역기에 넣으면, 음표를 묘사하는 토큰들이 한 개씩 차례로 튀어나옵니다. 마치 번역기가 단어를 하나씩 출력하듯이요.</p>

<h2 id="어떻게-작동하는가">어떻게 작동하는가</h2>
<ol type="1">
<li><p><strong>소리를 그림으로</strong>: 피아노 음원을 16kHz로 받아, 짧은 구간마다 주파수 성분을 분석해 “로그 mel 스펙트로그램”이라는 가로(시간)×세로(음높이) 그림으로 만듭니다.</p></li>
<li><p><strong>번역기에 통째로 입력</strong>: 이 그림 조각들을 Transformer 인코더가 한꺼번에 살펴봅니다(어텐션). 그러면 “여기쯤에 어떤 음들이 어떻게 울리는지”에 대한 압축된 이해가 만들어집니다.</p></li>
<li><p><strong>음표 토큰을 한 개씩 출력</strong>: 디코더가 이 이해를 바탕으로 “0.42초에 / 미들 C 음을 / 켜라” 같은 토큰을 하나씩 차례로 뱉습니다. 매 단계 가장 그럴듯한 토큰 하나를 고르는 단순한 방식(greedy)으로요.</p></li>
<li><p><strong>똑똑한 시간 표기</strong>: “직전 음으로부터 0.1초 뒤”처럼 상대적으로 적으면 초반의 작은 실수가 뒤로 갈수록 눈덩이처럼 커집니다. 그래서 이 모델은 <strong>항상 “구간 시작점부터 몇 ms”</strong>라는 절대 시각을 적습니다. 덕분에 한 음이 틀려도 나머지가 줄줄이 어긋나지 않습니다.</p></li>
<li><p><strong>조각을 이어 붙이기</strong>: 긴 곡은 약 4초 단위로 잘라 따로 번역한 뒤, 결과를 이어 붙여 한 곡의 MIDI로 완성합니다.</p></li>
</ol>
<p>놀라운 점은, <strong>출력 라벨만 바꾸면</strong> 같은 모델이 “음 시작만 받아쓰기” 같은 다른 작업으로 즉시 변신한다는 것입니다. 기계를 새로 설계할 필요가 없습니다.</p>
<h2 id="왜-중요한가">왜 중요한가</h2>
<p>이 논문은 “음악 채보는 음악 전문가가 손수 만든 특수 기계라야 잘한다”는 통념을 뒤집었습니다. <strong>범용 번역 모델이, 전용 모델과 맞먹거나 더 나은 성적</strong>(MAESTRO에서 Onset F1 95.95%, 세기까지 따지는 가장 어려운 기준에서 82.18%로 당시 최고)을 냈으니까요. 게다가 모델은 54M 파라미터로 작았고, 일부러 키우자 오히려 과적합으로 나빠졌습니다 — “큰 게 능사는 아니다”라는 교훈입니다.</p>
<p>가장 큰 파급력은 <strong>연구의 방향을 바꾼 것</strong>입니다. “더 정교한 음악 전용 모델을 설계하자”에서 “좋은 데이터를 모으고 입출력 토큰만 잘 정의하자”로요. 이 단순하고 유연한 틀은 곧바로 여러 악기를 한꺼번에 받아 적는 <strong>MT3</strong>로 확장되었고, 다시 보컬까지 직접 채보하는 <strong>YourMT3+</strong>로 이어집니다. 즉 이 논문은 현대 다중악기 채보 모델 계보의 <strong>출발점</strong>입니다.</p>
